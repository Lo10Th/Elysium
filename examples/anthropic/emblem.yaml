apiVersion: v1
name: anthropic
version: 1.0.0
description: Anthropic Claude API for AI text generation and conversation using Claude models
author: Elysium Team
license: MIT
homepage: https://docs.anthropic.com

baseUrl: https://api.anthropic.com/v1

auth:
  type: api_key
  keyEnv: ANTHROPIC_API_KEY
  header: x-api-key

tags:
  - ai
  - anthropic
  - claude
  - llm

category: ai

types:
  AnthropicMessage:
    description: A single input message in a Claude conversation with a role and text content
    properties:
      role:
        type: string
        required: true
        description: The role of the message author — user or assistant
      content:
        type: string
        required: true
        description: The text content of this message

  MessageContent:
    description: A content block within a Claude message response
    properties:
      type:
        type: string
        required: true
        description: The type of content block, currently always text
      text:
        type: string
        required: true
        description: The text generated by Claude in this content block

  MessageResponse:
    description: A complete response message from the Claude API
    properties:
      id:
        type: string
        required: true
        description: Unique message identifier (e.g. msg_xyz)
      type:
        type: string
        required: true
        description: Object type, always message
      role:
        type: string
        required: true
        description: The role of the response, always assistant
      content:
        type: array
        required: true
        description: Array of MessageContent blocks comprising the response
        items:
          type: object
      model:
        type: string
        required: true
        description: The model that handled the request
      stop_reason:
        type: string
        required: true
        description: Reason why generation stopped (end_turn, max_tokens, stop_sequence, tool_use)
      stop_sequence:
        type: string
        required: false
        description: The custom stop sequence that triggered stopping, if applicable
      usage:
        type: object
        required: true
        description: Token usage information (input_tokens, output_tokens)

  AnthropicModel:
    description: An Anthropic Claude model object with identifier and display information
    properties:
      id:
        type: string
        required: true
        description: Unique model identifier (e.g. claude-3-5-sonnet-20241022)
      display_name:
        type: string
        required: true
        description: Human-readable model name (e.g. Claude 3.5 Sonnet)
      created_at:
        type: string
        required: true
        description: ISO 8601 timestamp of when this model version was released

actions:
  create-message:
    description: Create a message with a Claude model for text generation and multi-turn conversation
    method: POST
    path: /messages
    parameters:
      - name: anthropic-version
        type: string
        in: header
        required: true
        description: Anthropic API version to use for this request
        default: "2023-06-01"
    requestBody:
      description: Message creation request with model, conversation history, and generation parameters
      contentType: application/json
      schema:
        type: object
        properties:
          model:
            type: string
            required: true
            description: The Claude model to use (e.g. claude-3-5-sonnet-20241022, claude-3-haiku-20240307)
          messages:
            type: array
            required: true
            description: Ordered array of input messages (AnthropicMessage objects with role and content)
            items:
              type: object
          max_tokens:
            type: integer
            required: true
            description: Maximum number of output tokens to generate — must be greater than 0
          system:
            type: string
            required: false
            description: System prompt providing context, instructions, or a persona for Claude
          temperature:
            type: number
            required: false
            description: Sampling temperature between 0 and 1. Higher values produce more varied responses
            default: 1
          top_p:
            type: number
            required: false
            description: Nucleus sampling probability mass. Use temperature or top_p, not both
          top_k:
            type: integer
            required: false
            description: Sample only from the top K most likely tokens for each position
          stream:
            type: boolean
            required: false
            description: If true, incrementally stream the response as server-sent events
            default: false
          stop_sequences:
            type: array
            required: false
            description: Custom sequences that will cause Claude to stop generating when encountered
            items:
              type: string
    responses:
      200:
        description: Successful message response from Claude with generated content and usage statistics
        schema:
          type: object
          properties:
            id:
              type: string
              description: Unique message identifier
            type:
              type: string
              description: Object type, always message
            role:
              type: string
              description: Response role, always assistant
            content:
              type: array
              description: Array of content blocks forming the response
              items:
                type: object
            model:
              type: string
              description: The model that generated this response
            stop_reason:
              type: string
              description: Reason why generation stopped
            stop_sequence:
              type: string
              description: Stop sequence that caused stopping, if applicable
            usage:
              type: object
              description: Input and output token counts for this request
    errors:
      - code: 400
        error: bad_request
        message: Invalid request parameters
        description: The request body contains invalid or missing parameters
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid API key must be provided in the x-api-key header
      - code: 429
        error: rate_limit_exceeded
        message: Too many requests
        description: Rate limit exceeded — implement exponential backoff before retrying
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on Anthropic servers
      - code: 529
        error: overloaded
        message: API overloaded
        description: Anthropic API is temporarily overloaded due to high demand — retry with backoff

  list-models:
    description: List all Claude models available to the authenticated API key
    method: GET
    path: /models
    parameters:
      - name: anthropic-version
        type: string
        in: header
        required: true
        description: Anthropic API version to use for this request
        default: "2023-06-01"
    responses:
      200:
        description: List of available Claude models with their identifiers and display names
        schema:
          type: object
          properties:
            data:
              type: array
              description: Array of AnthropicModel objects describing each available model
              items:
                type: object
            has_more:
              type: boolean
              description: Whether additional models exist beyond this page
            first_id:
              type: string
              description: Identifier of the first model in the returned list
            last_id:
              type: string
              description: Identifier of the last model in the returned list
    errors:
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid API key must be provided in the x-api-key header
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on Anthropic servers
