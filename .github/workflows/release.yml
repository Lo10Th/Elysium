name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=ely
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=ely.exe
          fi
          go build -ldflags="-s -w" -o bin/${GOOS}_${GOARCH}/${BINARY_NAME} .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ely-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/bin/${{ matrix.goos }}_${{ matrix.goarch }}/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            cd "$dir"
            tar -czf ../../release/${dir%/}.tar.gz *
            cd ..
          done
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Elysium CLI v${{ github.ref_name }}
            
            ### Installation
            
            #### Homebrew (macOS / Linux)
            
            ```bash
            brew tap Lo10Th/tap
            brew install ely
            ```
            
            #### Download binary
            
            Download the appropriate binary for your platform:
            
            - **Linux (amd64)**: ely-linux-amd64.tar.gz
            - **Linux (arm64)**: ely-linux-arm64.tar.gz
            - **macOS (amd64)**: ely-darwin-amd64.tar.gz
            - **macOS (arm64)**: ely-darwin-arm64.tar.gz
            - **Windows (amd64)**: ely-windows-amd64.tar.gz
            
            ### Quick Start
            
            ```bash
            # Extract and install
            tar -xzf ely-*.tar.gz
            chmod +x ely
            sudo mv ely /usr/local/bin/
            
            # Authenticate
            ely login
            
            # Pull and use emblems
            ely pull clothing-shop
            ely clothing-shop list-products
            ```
            
            ### What's New
            
            See [CHANGELOG.md](https://github.com/Lo10Th/Elysium/blob/main/CHANGELOG.md) for details.
          files: release/*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          chmod +x scripts/update-homebrew.sh
          ./scripts/update-homebrew.sh "${{ github.ref_name }}"

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ely.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Homebrew formula to ${{ github.ref_name }}"
            git push origin main
          fi