apiVersion: v1
name: slack
version: 1.0.0
description: Slack Web API — send messages, manage channels, and interact with users
author: Elysium Team
license: MIT

baseUrl: https://slack.com/api

auth:
  type: bearer
  keyEnv: SLACK_BOT_TOKEN

tags:
  - slack
  - messaging
  - collaboration
  - rest

category: communication

types:
  Message:
    description: A Slack message
    properties:
      ts:
        type: string
        required: true
        description: Message timestamp (used as unique ID)
      text:
        type: string
        required: false
        description: Plain text content of the message
      user:
        type: string
        required: false
        description: User ID of the message author
      channel:
        type: string
        required: false
        description: Channel ID where the message was posted

  Channel:
    description: A Slack channel
    properties:
      id:
        type: string
        required: true
        description: Unique channel ID (e.g. C012AB3CD)
      name:
        type: string
        required: true
        description: Channel name (without the # prefix)
      is_private:
        type: boolean
        required: false
        description: Whether the channel is private
      is_archived:
        type: boolean
        required: false
        description: Whether the channel is archived
      num_members:
        type: integer
        required: false
        description: Number of members in the channel

  User:
    description: A Slack user
    properties:
      id:
        type: string
        required: true
        description: Unique user ID (e.g. U012AB3CD)
      name:
        type: string
        required: true
        description: Username
      real_name:
        type: string
        required: false
        description: Full display name
      is_bot:
        type: boolean
        required: false
        description: Whether the user is a bot
      is_admin:
        type: boolean
        required: false
        description: Whether the user is an admin

actions:
  # ── Messaging ─────────────────────────────────────────────────────
  post-message:
    description: Send a message to a channel or user
    method: POST
    path: /chat.postMessage
    requestBody:
      contentType: application/json
      schema:
        type: object
        properties:
          channel:
            type: string
            required: true
            description: Channel ID or user ID (DM) to send the message to
          text:
            type: string
            required: false
            description: Plain text content of the message
          thread_ts:
            type: string
            required: false
            description: Timestamp of a message to reply to (creates a thread)
          mrkdwn:
            type: boolean
            required: false
            description: Whether to enable Slack markdown in the text field (default true)
    responses:
      200:
        description: Message posted successfully (check ok field in response)

  update-message:
    description: Update an existing message
    method: POST
    path: /chat.update
    requestBody:
      contentType: application/json
      schema:
        type: object
        properties:
          channel:
            type: string
            required: true
            description: Channel ID containing the message
          ts:
            type: string
            required: true
            description: Timestamp of the message to update
          text:
            type: string
            required: false
            description: New text for the message
    responses:
      200:
        description: Message updated

  delete-message:
    description: Delete a message from a channel
    method: POST
    path: /chat.delete
    requestBody:
      contentType: application/json
      schema:
        type: object
        properties:
          channel:
            type: string
            required: true
            description: Channel ID containing the message
          ts:
            type: string
            required: true
            description: Timestamp of the message to delete
    responses:
      200:
        description: Message deleted

  get-permalink:
    description: Get a permanent URL for a message
    method: GET
    path: /chat.getPermalink
    parameters:
      - name: channel
        type: string
        in: query
        required: true
        description: Channel ID containing the message
      - name: message_ts
        type: string
        in: query
        required: true
        description: Timestamp of the message
    responses:
      200:
        description: Permanent link to the message

  # ── Channels ──────────────────────────────────────────────────────
  list-channels:
    description: List all public channels in the workspace
    method: GET
    path: /conversations.list
    parameters:
      - name: types
        type: string
        in: query
        required: false
        description: "Comma-separated channel types: public_channel, private_channel, im, mpim"
      - name: limit
        type: integer
        in: query
        required: false
        description: Number of channels to return (max 1000)
      - name: cursor
        type: string
        in: query
        required: false
        description: Pagination cursor from a previous response
    responses:
      200:
        description: List of channels

  get-channel-info:
    description: Get detailed information about a channel
    method: GET
    path: /conversations.info
    parameters:
      - name: channel
        type: string
        in: query
        required: true
        description: Channel ID
    responses:
      200:
        description: Channel details

  get-channel-history:
    description: Retrieve recent messages from a channel
    method: GET
    path: /conversations.history
    parameters:
      - name: channel
        type: string
        in: query
        required: true
        description: Channel ID
      - name: limit
        type: integer
        in: query
        required: false
        description: Number of messages to return (default 100, max 200)
      - name: oldest
        type: string
        in: query
        required: false
        description: Only return messages after this Unix timestamp
      - name: latest
        type: string
        in: query
        required: false
        description: Only return messages before this Unix timestamp
    responses:
      200:
        description: Message history

  create-channel:
    description: Create a new public or private channel
    method: POST
    path: /conversations.create
    requestBody:
      contentType: application/json
      schema:
        type: object
        properties:
          name:
            type: string
            required: true
            description: Channel name (lowercase, no spaces — use hyphens)
          is_private:
            type: boolean
            required: false
            description: Set true to create a private channel (default false)
    responses:
      200:
        description: Created channel details

  # ── Users ─────────────────────────────────────────────────────────
  list-users:
    description: List all users in the workspace
    method: GET
    path: /users.list
    parameters:
      - name: limit
        type: integer
        in: query
        required: false
        description: Number of users to return per page
      - name: cursor
        type: string
        in: query
        required: false
        description: Pagination cursor from a previous response
    responses:
      200:
        description: List of workspace members

  get-user-info:
    description: Get information about a user
    method: GET
    path: /users.info
    parameters:
      - name: user
        type: string
        in: query
        required: true
        description: User ID (e.g. U012AB3CD)
    responses:
      200:
        description: User details

  lookup-user-by-email:
    description: Find a user by email address
    method: GET
    path: /users.lookupByEmail
    parameters:
      - name: email
        type: string
        in: query
        required: true
        description: Email address to look up
    responses:
      200:
        description: Matching user or ok=false if no user was found
