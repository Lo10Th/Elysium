apiVersion: v1
name: aws-s3
version: 1.0.0
description: AWS Simple Storage Service (S3) API for managing cloud storage buckets and objects. Authentication uses AWS Signature Version 4 — set both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY environment variables.
author: Elysium Team
license: MIT
homepage: https://docs.aws.amazon.com/s3/

baseUrl: https://s3.amazonaws.com

auth:
  type: api_key
  keyEnv: AWS_ACCESS_KEY_ID
  header: Authorization

tags:
  - aws
  - s3
  - storage
  - cloud

category: storage

types:
  Owner:
    description: An AWS account owner associated with a bucket or object
    properties:
      id:
        type: string
        required: true
        description: The canonical user ID of the owner
      display_name:
        type: string
        required: false
        description: The display name of the owner account

  Bucket:
    description: An S3 bucket used to store objects in the cloud
    properties:
      name:
        type: string
        required: true
        description: The globally unique name of the bucket
      creation_date:
        type: string
        required: false
        description: The date and time the bucket was created (ISO 8601)

  S3Object:
    description: An object stored within an S3 bucket
    properties:
      key:
        type: string
        required: true
        description: The object key (path and filename within the bucket)
      size:
        type: integer
        required: false
        description: The size of the object in bytes
      last_modified:
        type: string
        required: false
        description: The last modified timestamp of the object (ISO 8601)
      etag:
        type: string
        required: false
        description: The entity tag (ETag) which is an MD5 hash of the object data
      storage_class:
        type: string
        required: false
        description: The storage class of the object (e.g. STANDARD, GLACIER)

actions:
  list-buckets:
    description: List all S3 buckets owned by the authenticated AWS account
    method: GET
    path: /
    responses:
      200:
        description: Owner information and list of S3 buckets owned by the account
        schema:
          type: object
          properties:
            owner:
              type: object
              required: true
              description: The AWS account that owns the buckets
              properties:
                id:
                  type: string
                  required: true
                  description: Canonical user ID
                display_name:
                  type: string
                  required: false
                  description: Display name of the owner
            buckets:
              type: array
              required: true
              description: List of buckets owned by the account
              items:
                type: object
                properties:
                  name:
                    type: string
                    required: true
                    description: Bucket name
                  creation_date:
                    type: string
                    required: false
                    description: Bucket creation date (ISO 8601)

  create-bucket:
    description: Create a new S3 bucket with the specified globally unique name
    method: PUT
    path: /{bucket}
    parameters:
      - name: bucket
        type: string
        in: path
        required: true
        description: The globally unique name for the new S3 bucket
    requestBody:
      description: Optional bucket configuration including region constraints
      contentType: application/xml
      schema:
        type: object
        properties:
          location_constraint:
            type: string
            required: false
            description: The AWS region where the bucket should be created
    responses:
      200:
        description: Bucket created successfully
      400:
        description: Invalid bucket name or malformed configuration
      409:
        description: Bucket name already exists or conflicts with another bucket

  list-objects:
    description: List objects in a bucket with optional prefix, pagination, and filtering
    method: GET
    path: /{bucket}
    parameters:
      - name: bucket
        type: string
        in: path
        required: true
        description: The name of the S3 bucket to list objects from
      - name: list-type
        type: integer
        in: query
        required: false
        default: 2
        description: API version for listing (use 2 for ListObjectsV2)
      - name: prefix
        type: string
        in: query
        required: false
        description: Filters results to keys that begin with this prefix
      - name: max-keys
        type: integer
        in: query
        required: false
        default: 1000
        description: Maximum number of objects to return per request (1-1000)
      - name: continuation-token
        type: string
        in: query
        required: false
        description: Token from a previous response to retrieve the next page of results
    responses:
      200:
        description: Paginated list of objects with bucket metadata and continuation token
        schema:
          type: object
          properties:
            name:
              type: string
              required: true
              description: The bucket name
            prefix:
              type: string
              required: false
              description: The prefix used to filter results
            max_keys:
              type: integer
              required: false
              description: Maximum number of keys returned
            key_count:
              type: integer
              required: false
              description: Number of keys returned in this response
            is_truncated:
              type: boolean
              required: false
              description: Whether more results are available
            next_continuation_token:
              type: string
              required: false
              description: Token to retrieve the next page of results
            contents:
              type: array
              required: false
              description: List of matching objects in the bucket
              items:
                type: object
                properties:
                  key:
                    type: string
                    required: true
                    description: Object key
                  size:
                    type: integer
                    required: false
                    description: Object size in bytes
                  last_modified:
                    type: string
                    required: false
                    description: Last modified timestamp (ISO 8601)
                  etag:
                    type: string
                    required: false
                    description: Entity tag (MD5 hash) of the object
                  storage_class:
                    type: string
                    required: false
                    description: Storage class (e.g. STANDARD, GLACIER)
      404:
        description: The specified bucket does not exist

  upload-object:
    description: Upload a file or object to a specified S3 bucket and key path
    method: PUT
    path: /{bucket}/{key}
    parameters:
      - name: bucket
        type: string
        in: path
        required: true
        description: The name of the destination S3 bucket
      - name: key
        type: string
        in: path
        required: true
        description: The object key (path and filename) to store the object under
    requestBody:
      description: The binary file content to upload to S3
      contentType: application/octet-stream
      schema:
        type: string
    responses:
      200:
        description: Object uploaded successfully to the bucket
      400:
        description: Invalid request parameters or object configuration
      404:
        description: The specified bucket does not exist

  download-object:
    description: Download a file or object from a specified S3 bucket and key
    method: GET
    path: /{bucket}/{key}
    parameters:
      - name: bucket
        type: string
        in: path
        required: true
        description: The name of the S3 bucket containing the object
      - name: key
        type: string
        in: path
        required: true
        description: The object key (path and filename) of the object to download
    responses:
      200:
        description: The binary content of the requested object
        schema:
          type: string
      404:
        description: The specified bucket or object does not exist

  delete-object:
    description: Permanently delete an object from a specified S3 bucket
    method: DELETE
    path: /{bucket}/{key}
    parameters:
      - name: bucket
        type: string
        in: path
        required: true
        description: The name of the S3 bucket containing the object
      - name: key
        type: string
        in: path
        required: true
        description: The object key (path and filename) of the object to delete
    responses:
      204:
        description: Object deleted successfully
      404:
        description: The specified bucket or object does not exist

errors:
  - code: 400
    error: bad_request
    message: Bad Request
    description: The request was malformed or contained invalid parameters
  - code: 403
    error: access_denied
    message: Access Denied
    description: The AWS credentials do not have permission to perform this operation
  - code: 404
    error: no_such_bucket
    message: No Such Bucket
    description: The specified bucket does not exist; check the error code field for "NoSuchBucket" to distinguish from missing-key errors
  - code: 404
    error: no_such_key
    message: No Such Key
    description: The specified object key does not exist in the bucket; check the error code field for "NoSuchKey" to distinguish from missing-bucket errors
  - code: 409
    error: bucket_already_exists
    message: Bucket Already Exists
    description: The requested bucket name is already in use by another account
  - code: 409
    error: bucket_not_empty
    message: Bucket Not Empty
    description: The bucket cannot be deleted because it is not empty
  - code: 413
    error: entity_too_large
    message: Entity Too Large
    description: The upload exceeds the maximum allowed object size (5 TB)
  - code: 500
    error: internal_error
    message: Internal Error
    description: An internal error occurred on the S3 service; retry the request
