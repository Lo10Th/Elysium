apiVersion: v1
name: openai
version: 1.0.0
description: OpenAI API for AI text generation, embeddings, and image creation using GPT and DALL-E models
author: Elysium Team
license: MIT
homepage: https://platform.openai.com/docs

baseUrl: https://api.openai.com/v1

auth:
  type: bearer
  keyEnv: OPENAI_API_KEY

tags:
  - ai
  - openai
  - gpt
  - dall-e
  - embeddings
  - llm

category: ai

types:
  ChatMessage:
    description: A message in a chat conversation with a role and text content
    properties:
      role:
        type: string
        required: true
        description: The role of the message author (system, user, assistant, or tool)
      content:
        type: string
        required: true
        description: The text content of the message

  ChatCompletionChoice:
    description: A single completion choice returned by the chat completions API
    properties:
      index:
        type: integer
        required: true
        description: Zero-based index of this choice in the list
      message:
        type: object
        required: true
        description: The generated message (ChatMessage object with role and content)
      finish_reason:
        type: string
        required: true
        description: Reason generation stopped (stop, length, tool_calls, content_filter)

  ChatCompletion:
    description: A full chat completion response returned by the OpenAI API
    properties:
      id:
        type: string
        required: true
        description: Unique identifier for this completion (e.g. chatcmpl-xyz)
      object:
        type: string
        required: true
        description: Object type, always chat.completion
      created:
        type: integer
        required: true
        description: Unix timestamp of when the completion was created
      model:
        type: string
        required: true
        description: The model used to generate this completion
      choices:
        type: array
        required: true
        description: List of completion choices generated by the model
        items:
          type: object
      usage:
        type: object
        required: false
        description: Token usage statistics (prompt_tokens, completion_tokens, total_tokens)

  Model:
    description: An OpenAI model object describing a model available via the API
    properties:
      id:
        type: string
        required: true
        description: Unique model identifier (e.g. gpt-4, gpt-3.5-turbo)
      object:
        type: string
        required: true
        description: Object type, always model
      created:
        type: integer
        required: true
        description: Unix timestamp of when this model was created
      owned_by:
        type: string
        required: true
        description: The organization that owns and maintains the model

  Embedding:
    description: An embedding vector object containing a numerical representation of input text
    properties:
      object:
        type: string
        required: true
        description: Object type, always embedding
      embedding:
        type: array
        required: true
        description: The embedding vector as an array of floating-point numbers
        items:
          type: number
      index:
        type: integer
        required: true
        description: Zero-based index of this embedding in the response list

  ImageData:
    description: A generated image object returned by the images API
    properties:
      url:
        type: string
        required: false
        description: Public URL of the generated image (when response_format is url)
      b64_json:
        type: string
        required: false
        description: Base64-encoded PNG image data (when response_format is b64_json)
      revised_prompt:
        type: string
        required: false
        description: The revised prompt used for generation, returned by DALL-E 3 only

actions:
  chat-completions:
    description: Create a chat completion using GPT-4, GPT-3.5-turbo, or other chat models
    method: POST
    path: /chat/completions
    requestBody:
      description: Chat completion request body with model, messages, and generation parameters
      contentType: application/json
      schema:
        type: object
        properties:
          model:
            type: string
            required: true
            description: Model ID to use (e.g. gpt-4, gpt-4o, gpt-3.5-turbo)
          messages:
            type: array
            required: true
            description: Ordered list of conversation messages (ChatMessage objects with role and content)
            items:
              type: object
          temperature:
            type: number
            required: false
            description: Sampling temperature between 0 and 2. Higher values produce more random output
            default: 1
          max_tokens:
            type: integer
            required: false
            description: Maximum number of tokens to generate in the completion
          stream:
            type: boolean
            required: false
            description: If true, stream partial message deltas as server-sent events
            default: false
          top_p:
            type: number
            required: false
            description: Nucleus sampling mass — only tokens comprising top_p probability are considered
            default: 1
          frequency_penalty:
            type: number
            required: false
            description: Penalize new tokens based on their existing frequency in the text (-2.0 to 2.0)
            default: 0
          presence_penalty:
            type: number
            required: false
            description: Penalize new tokens based on whether they appear in the text so far (-2.0 to 2.0)
            default: 0
          n:
            type: integer
            required: false
            description: Number of independent completion choices to generate for each message
            default: 1
          stop:
            type: string
            required: false
            description: Up to 4 sequences at which generation stops (string or array of strings)
    responses:
      200:
        description: Successful chat completion with generated message choices and usage statistics
        schema:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the completion
            object:
              type: string
              description: Object type, always chat.completion
            created:
              type: integer
              description: Unix timestamp of when the completion was created
            model:
              type: string
              description: Model used to generate the completion
            choices:
              type: array
              description: List of generated completion choices
              items:
                type: object
            usage:
              type: object
              description: Token usage statistics for this request
    errors:
      - code: 400
        error: bad_request
        message: Invalid request parameters
        description: The request contains invalid or missing parameters such as an unrecognized model
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid Bearer token must be provided in the Authorization header
      - code: 429
        error: rate_limit_exceeded
        message: Too many requests
        description: Rate limit or token quota exceeded — implement exponential backoff before retrying
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on OpenAI servers

  list-models:
    description: List all OpenAI models available to the authenticated API key
    method: GET
    path: /models
    responses:
      200:
        description: Paginated list of available models with metadata
        schema:
          type: object
          properties:
            object:
              type: string
              description: Object type, always list
            data:
              type: array
              description: Array of Model objects describing each available model
              items:
                type: object
    errors:
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid Bearer token must be provided in the Authorization header
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on OpenAI servers

  create-embedding:
    description: Generate embedding vectors for input text using a specified embedding model
    method: POST
    path: /embeddings
    requestBody:
      description: Embedding request with model ID and input text or tokens
      contentType: application/json
      schema:
        type: object
        properties:
          model:
            type: string
            required: true
            description: Embedding model to use (e.g. text-embedding-3-small, text-embedding-ada-002)
          input:
            type: string
            required: true
            description: Input text to embed — a string, array of strings, or array of token arrays
    responses:
      200:
        description: Embedding response containing vectors for each input
        schema:
          type: object
          properties:
            object:
              type: string
              description: Object type, always list
            data:
              type: array
              description: Array of Embedding objects each containing a vector
              items:
                type: object
            model:
              type: string
              description: The model used to generate the embeddings
            usage:
              type: object
              description: Token usage statistics (prompt_tokens, total_tokens)
    errors:
      - code: 400
        error: bad_request
        message: Invalid request parameters
        description: The request contains invalid parameters or the input exceeds the model's token limit
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid Bearer token must be provided in the Authorization header
      - code: 429
        error: rate_limit_exceeded
        message: Too many requests
        description: Rate limit or token quota exceeded — implement exponential backoff before retrying
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on OpenAI servers

  create-image:
    description: Generate images from a text prompt using DALL-E 2 or DALL-E 3 models
    method: POST
    path: /images/generations
    requestBody:
      description: Image generation request with prompt and optional model, size, and format settings
      contentType: application/json
      schema:
        type: object
        properties:
          prompt:
            type: string
            required: true
            description: Text description of the desired image (max 1000 chars for DALL-E 2, 4000 for DALL-E 3)
          model:
            type: string
            required: false
            description: Image model to use — dall-e-2 or dall-e-3
            default: dall-e-2
          n:
            type: integer
            required: false
            description: Number of images to generate (1–10 for DALL-E 2, must be 1 for DALL-E 3)
            default: 1
          size:
            type: string
            required: false
            description: "Image dimensions — DALL-E 2: 256x256, 512x512, 1024x1024; DALL-E 3: 1024x1024, 1792x1024, 1024x1792"
            default: 1024x1024
          quality:
            type: string
            required: false
            description: Image quality — standard or hd (DALL-E 3 only, hd creates finer detail)
            default: standard
          response_format:
            type: string
            required: false
            description: Format of the returned image data — url or b64_json
            default: url
          style:
            type: string
            required: false
            description: Visual style — vivid (hyper-real) or natural (less hyper-real, DALL-E 3 only)
            default: vivid
    responses:
      200:
        description: Image generation result containing image URLs or base64-encoded data
        schema:
          type: object
          properties:
            created:
              type: integer
              description: Unix timestamp of when the images were generated
            data:
              type: array
              description: Array of ImageData objects with url, b64_json, or revised_prompt fields
              items:
                type: object
    errors:
      - code: 400
        error: bad_request
        message: Invalid request parameters
        description: The request contains invalid parameters, an unrecognized model, or content flagged by safety systems
      - code: 401
        error: unauthorized
        message: Authentication required
        description: A valid Bearer token must be provided in the Authorization header
      - code: 429
        error: rate_limit_exceeded
        message: Too many requests
        description: Rate limit exceeded — implement exponential backoff before retrying
      - code: 500
        error: internal_error
        message: Internal server error
        description: An unexpected error occurred on OpenAI servers
