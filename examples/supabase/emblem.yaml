apiVersion: v1
name: supabase
version: 1.0.0
description: Supabase API — database tables, row-level queries, and auth user management via REST and Auth APIs
author: Elysium Team
license: MIT

baseUrl: https://your-project-ref.supabase.co

auth:
  type: bearer
  keyEnv: SUPABASE_SERVICE_KEY

tags:
  - database
  - auth
  - supabase
  - postgresql
  - rest

category: database

types:
  Table:
    description: A table exposed via the Supabase REST API
    properties:
      name:
        type: string
        required: true
        description: Name of the table
      schema:
        type: string
        required: false
        default: public
        description: Database schema the table belongs to (default is public)
      rls_enabled:
        type: boolean
        required: false
        description: Whether Row Level Security is enabled on the table

  AuthUser:
    description: A Supabase auth user object
    properties:
      id:
        type: string
        required: true
        description: Unique user identifier (UUID)
      email:
        type: string
        required: false
        description: User email address
      phone:
        type: string
        required: false
        description: User phone number
      role:
        type: string
        required: false
        description: User role within the Supabase project
      created_at:
        type: string
        required: false
        description: ISO 8601 timestamp when the user was created
      updated_at:
        type: string
        required: false
        description: ISO 8601 timestamp when the user was last updated
      last_sign_in_at:
        type: string
        required: false
        description: ISO 8601 timestamp of the user's last sign-in
      email_confirmed_at:
        type: string
        required: false
        description: ISO 8601 timestamp when the user's email was confirmed

actions:
  # ── Tables ────────────────────────────────────────────────────────
  list-tables:
    description: List all tables exposed via the Supabase REST API (OpenAPI spec)
    method: GET
    path: /rest/v1/
    parameters:
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project API key
    responses:
      200:
        description: OpenAPI specification describing all available tables and their schemas

  # ── Row Operations ────────────────────────────────────────────────
  query-table:
    description: Query rows from a table with optional filters, column selection, and pagination
    method: GET
    path: /rest/v1/{table}
    parameters:
      - name: table
        type: string
        in: path
        required: true
        description: Table name to query
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project API key
      - name: select
        type: string
        in: query
        required: false
        default: "*"
        description: Columns to return as a comma-separated list (e.g. id,name,email)
      - name: order
        type: string
        in: query
        required: false
        description: Column and sort direction (e.g. id.asc, created_at.desc)
      - name: limit
        type: integer
        in: query
        required: false
        default: 100
        description: Maximum number of rows to return
      - name: offset
        type: integer
        in: query
        required: false
        default: 0
        description: Number of rows to skip for pagination
    responses:
      200:
        description: Array of rows matching the query filters

  insert-row:
    description: Insert one or more rows into a table
    method: POST
    path: /rest/v1/{table}
    parameters:
      - name: table
        type: string
        in: path
        required: true
        description: Table name to insert into
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project API key
      - name: Prefer
        type: string
        in: header
        required: false
        default: return=representation
        description: Return preference — use return=representation to get inserted rows back
    requestBody:
      description: Row data as key-value pairs matching the target table columns
      contentType: application/json
      schema:
        type: object
    responses:
      201:
        description: Row inserted successfully

  update-row:
    description: Update rows in a table that match the provided query filters
    method: PATCH
    path: /rest/v1/{table}
    parameters:
      - name: table
        type: string
        in: path
        required: true
        description: Table name to update
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project API key
      - name: Prefer
        type: string
        in: header
        required: false
        default: return=representation
        description: Return preference — use return=representation to get updated rows back
    requestBody:
      description: Fields to update as key-value pairs
      contentType: application/json
      schema:
        type: object
    responses:
      200:
        description: Rows updated successfully

  delete-row:
    description: Delete rows from a table that match the provided query filters
    method: DELETE
    path: /rest/v1/{table}
    parameters:
      - name: table
        type: string
        in: path
        required: true
        description: Table name to delete from
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project API key
      - name: Prefer
        type: string
        in: header
        required: false
        default: return=minimal
        description: Return preference — use return=minimal for 204 No Content or return=representation to get deleted rows back
    responses:
      204:
        description: Rows deleted successfully

  # ── Auth Users ────────────────────────────────────────────────────
  list-users:
    description: List all auth users in the project (admin endpoint, requires service role key)
    method: GET
    path: /auth/v1/admin/users
    parameters:
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project service role key
      - name: page
        type: integer
        in: query
        required: false
        default: 1
        description: Page number for pagination
      - name: per_page
        type: integer
        in: query
        required: false
        default: 50
        description: Number of users to return per page
    responses:
      200:
        description: Paginated list of auth users

  create-user:
    description: Create a new auth user in the project (admin endpoint, requires service role key)
    method: POST
    path: /auth/v1/admin/users
    parameters:
      - name: apikey
        type: string
        in: header
        required: true
        description: Supabase project service role key
    requestBody:
      description: New user data — at least one of email or phone must be provided (validated server-side) along with optional password and confirmation flags
      contentType: application/json
      schema:
        type: object
        properties:
          email:
            type: string
            required: false
            description: Email address for the new user
          phone:
            type: string
            required: false
            description: Phone number for the new user
          password:
            type: string
            required: false
            description: Password for the new user
          email_confirm:
            type: boolean
            required: false
            default: false
            description: Whether to automatically confirm the user's email address
          phone_confirm:
            type: boolean
            required: false
            default: false
            description: Whether to automatically confirm the user's phone number
    responses:
      200:
        description: The newly created auth user
        schema: AuthUser
